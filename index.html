<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andli - Tactical Premium Sneakers</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
        }
        
        .hero {
            position: relative;
            height: 620px;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        
        .hero-content h1 {
            font-size: 52px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        
        .hero-content p {
            font-size: 18px;
            max-width: 600px;
        }
        
        .product-showcase {
            padding: 60px 40px;
            background: white;
        }
        
        .section-title {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 50px;
        }
        
        .sneaker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .sneaker-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        
        .sneaker-card:hover {
            transform: scale(1.04);
        }
        
        .sneaker-image {
            height: 240px;
            background: #f1f3f5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .sneaker-image img {
            max-height: 100%;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
        }
        
        .sneaker-info {
            padding: 18px;
            text-align: center;
        }
        
        .sneaker-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .sneaker-price {
            color: #e76f51;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- HERO SECTION - Tactical Scene -->
    <div class="hero">
        <div class="hero-content">
            <h1>ANDLI</h1>
            <p>Engineered for the extreme.<br>Built for those who never quit.</p>
        </div>
    </div>

    <!-- SNEAKER SHOWCASE -->
    <div class="product-showcase">
        <h2 class="section-title">Tactical Performance Series</h2>
        
        <div class="sneaker-grid">
            
            <!-- Shoe 1 -->
            <div class="sneaker-card">
                <div class="sneaker-image">
                    <img src="https://picsum.photos/id/201/400/280" alt="Grey Tactical Runner">
                </div>
                <div class="sneaker-info">
                    <div class="sneaker-name">ShadowStrike Runner</div>
                    <div class="sneaker-price">$179</div>
                </div>
            </div>
            
            <!-- Shoe 2 -->
            <div class="sneaker-card">
                <div class="sneaker-image">
                    <img src="https://picsum.photos/id/866/400/280" alt="Black Camo Sneaker">
                </div>
                <div class="sneaker-info">
                    <div class="sneaker-name">PhantomForce Low</div>
                    <div class="sneaker-price">$159</div>
                </div>
            </div>
            
            <!-- Shoe 3 -->
            <div class="sneaker-card">
                <div class="sneaker-image">
                    <img src="https://picsum.photos/id/1015/400/280" alt="Urban Combat Boot">
                </div>
                <div class="sneaker-info">
                    <div class="sneaker-name">Urban Assault Mid</div>
                    <div class="sneaker-price">$199</div>
                </div>
            </div>
            
            <!-- Shoe 4 -->
            <div class="sneaker-card">
                <div class="sneaker-image">
                    <img src="https://picsum.photos/id/237/400/280" alt="Orange Accent Sneaker">
                </div>
                <div class="sneaker-info">
                    <div class="sneaker-name">Inferno Trail</div>
                    <div class="sneaker-price">$169</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
