<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andli - Premium Tactical Footwear</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            color: #222;
        }
        
        header {
            background: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 40px;
        }
        
        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        
        .logo span {
            color: #e76f51;
        }
        
        .nav-links {
            display: flex;
            gap: 36px;
            font-weight: 500;
        }
        
        .nav-links a {
            text-decoration: none;
            color: #222;
        }
        
        .right-actions {
            display: flex;
            align-items: center;
            gap: 22px;
            font-size: 20px;
        }
        
        .hero {
            height: 680px;
            background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.55)), url('https://picsum.photos/id/1015/1920/1080') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .hero-content {
            text-align: center;
            color: white;
        }
        
        .hero-content h1 {
            font-size: 58px;
            font-weight: 800;
            margin-bottom: 16px;
        }
        
        .hero-content p {
            font-size: 19px;
            max-width: 620px;
        }
        
        .product-showcase {
            padding: 80px 40px;
        }
        
        .section-title {
            text-align: center;
            font-size: 38px;
            font-weight: 700;
            margin-bottom: 60px;
        }
        
        .sneaker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 32px;
            max-width: 1280px;
            margin: 0 auto;
        }
        
        .sneaker-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
        }
        
        .sneaker-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }
        
        .sneaker-image {
            height: 280px;
            background: #f1f3f5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .sneaker-image img {
            max-height: 92%;
            filter: drop-shadow(8px 12px 18px rgba(0,0,0,0.25));
        }
        
        .sneaker-info {
            padding: 22px;
            text-align: center;
        }
        
        .sneaker-name {
            font-weight: 600;
            font-size: 17px;
        }
        
        .sneaker-price {
            color: #e76f51;
            font-weight: 700;
            margin-top: 6px;
        }
    </style>
</head>
<body>

    <header>
        <div class="top-nav">
            <div class="logo">Andli <span>PREMIUM</span></div>
            
            <div class="nav-links">
                <a href="#">HOME</a>
                <a href="#">YEEZY</a>
                <a href="#">NIKE</a>
                <a href="#">NEW DROPS</a>
                <a href="#">COLLECTIONS</a>
                <a href="#">KICKS</a>
                <a href="#">HATS</a>
            </div>
            
            <div class="right-actions">
                <i class="fas fa-search"></i>
                <i class="fas fa-shopping-cart"></i>
                <i class="fas fa-user"></i>
                <button style="background:#111; color:white; padding:10px 26px; border-radius:30px; font-weight:600;">BECOME A MEMBER</button>
            </div>
        </div>
    </header>

    <!-- HERO - Tactical Forest Scene -->
    <div class="hero">
        <div class="hero-content">
            <h1>ANDLI</h1>
            <p>Built for the battlefield.<br>Designed for everyday dominance.</p>
        </div>
    </div>

    <!-- SNEAKER SHOWCASE -->
    <div class="product-showcase">
        <h2 class="section-title">Signature Tactical Series</h2>
        
        <div class="sneaker-grid">
            <div class="sneaker-card">
                <div class="sneaker-image">
                    <img src="https://picsum.photos/id/201/420/300" alt="Grey Tactical Sneaker">
                </div>
                <div class="sneaker-info">
                    <div class="sneaker-name">ShadowStrike Low</div>
                    <div class="sneaker-price">$179</div>
                </div>
            </div>
            
            <div class="sneaker-card">
                <div class="sneaker-image">
                    <img src="https://picsum.photos/id/866/420/300" alt="Black Camo">
                </div>
                <div class="sneaker-info">
                    <div class="sneaker-name">PhantomForce Mid</div>
                    <div class="sneaker-price">$199</div>
                </div>
            </div>
            
            <div class="sneaker-card">
                <div class="sneaker-image">
                    <img src="https://picsum.photos/id/1015/420/300" alt="Urban Assault">
                </div>
                <div class="sneaker-info">
                    <div class="sneaker-name">Urban Assault Runner</div>
                    <div class="sneaker-price">$169</div>
                </div>
            </div>
            
            <div class="sneaker-card">
                <div class="sneaker-image">
                    <img src="https://picsum.photos/id/237/420/300" alt="Orange Accent">
                </div>
                <div class="sneaker-info">
                    <div class="sneaker-name">Inferno Trail Pro</div>
                    <div class="sneaker-price">$189</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
